<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria, Contato e Cadastro</title>
<style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
}

/* HEADER */

header{
    background:#111;
    padding:20px;
    text-align:center;
}

header h1{
    margin-bottom:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:#00bfff;
}

/* SECTIONS */

section{
    padding:40px;
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:white;
}

/* FORMULÁRIOS */

form{
    max-width:700px;
    margin:auto;
    background:#111;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
}

.campo{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:white;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #555;
    background:#222;
    color:white;
    font-size:16px;
}

input::placeholder,
textarea::placeholder{
    color:#aaa;
}

textarea{
    resize:none;
    height:120px;
}

/* RADIO E CHECKBOX ARRUMADOS */

.radio-group,
.checkbox-group{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:10px;
}

.radio-group input,
.checkbox-group input{
    width:auto;
    margin:0;
}

.radio-group label,
.checkbox-group label{
    display:inline;
    margin:0 15px 0 5px;
    font-weight:normal;
}

/* BOTÕES */

button{
    background:#222;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-right:10px;
    transition:0.3s;
    font-size:16px;
}

button:hover{
    background:#444;
}

/* FOOTER */

footer{
    background:#111;
    text-align:center;
    padding:20px;
    margin-top:40px;
    color:white;
}


  </style>
</head>

<body>

  <header>
    <h1>Meu Site</h1>

    <nav>
    <a href="file:///C:/Users/Kauan%20Machado/Desktop/LENINHO%20ATIVI%20JAVA/LENINHO%20HTML/Hobbies.html#contato">Galeria</a>
    <a href="file:///C:/Users/Kauan%20Machado/Desktop/LENINHO%20ATIVI%20JAVA/LENINHO%20HTML/contato1.html">Contato</a>
    <a href="file:///C:/Users/Kauan%20Machado/Desktop/LENINHO%20ATIVI%20JAVA/LENINHO%20HTML/cadastro.html">Cadastro</a>
</nav>
  </header>

<!-- CADASTRO -->

  <section id="cadastro">

    <h2>Página de Cadastro</h2>

    <form>

      <!-- Nome -->
      <div class="campo">
        <label for="nome">Nome Completo:</label>

        <input
          type="text"
          id="nome"
          name="nome"
          required
          minlength="3"
          maxlength="100"
        >
      </div>

      <!-- Email -->
      <div class="campo">
        <label for="email">Email:</label>

        <input
          type="email"
          id="email"
          name="email"
          required
        >
      </div>

      <!-- Senha -->
      <div class="campo">
        <label for="senha">Senha:</label>

        <input
          type="password"
          id="senha"
          name="senha"
          required
          minlength="6"
          maxlength="20"
        >
      </div>

      <!-- Data -->
      <div class="campo">
        <label for="dataNascimento">Data de Nascimento:</label>

        <input
          type="date"
          id="dataNascimento"
          name="dataNascimento"
          required
        >
      </div>

      <!-- Idade -->
      <div class="campo">
        <label for="idade">Idade:</label>

        <input
          type="number"
          id="idade"
          name="idade"
          required
          min="1"
          max="120"
        >
      </div>

      <!-- Telefone -->
      <div class="campo">
        <label for="telefone">Telefone:</label>

        <input
          type="tel"
          id="telefone"
          name="telefone"
          required
          pattern="[0-9]{11}"
          maxlength="11"
          placeholder="31999999999"
        >
      </div>

      <!-- Gênero -->
      <div class="campo">
        <label>Gênero:</label>

        <div class="radio-group">

          <input type="radio" id="masculino" name="genero" required>
          <label for="masculino">Masculino</label>

          <input type="radio" id="feminino" name="genero">
          <label for="feminino">Feminino</label>

          <input type="radio" id="outro" name="genero">
          <label for="outro">Outro</label>

        </div>
      </div>

      <!-- Interesses -->
      <div class="campo">
        <label>Interesses:</label>

        <div class="checkbox-group">

          <input type="checkbox" id="html" name="interesses">
          <label for="html">HTML</label>

          <input type="checkbox" id="css" name="interesses">
          <label for="css">CSS</label>

          <input type="checkbox" id="js" name="interesses">
          <label for="js">JavaScript</label>

        </div>
      </div>

      <!-- Cidade -->
      <div class="campo">
        <label for="cidade">Cidade:</label>

        <select id="cidade" name="cidade" required>

          <option value="">Selecione</option>
          <option value="coronel-fabriciano">Coronel Fabriciano</option>
          <option value="ipatinga">Ipatinga</option>
          <option value="timoteo">Timóteo</option>
          <option value="belo-horizonte">Belo Horizonte</option>

        </select>
      </div>

      <!-- Comentários -->
      <div class="campo">
        <label for="comentarios">Comentários Adicionais:</label>

        <textarea
          id="comentarios"
          name="comentarios"
          maxlength="300"
          placeholder="Digite aqui..."
        ></textarea>
      </div>

      <!-- Botões -->
      <button type="submit">Enviar Cadastro</button>

      <button type="reset">Limpar Formulário</button>

    </form>

  </section>

  <footer>
    <p>© 2026 - Site desenvolvido em HTML e CSS</p>
  </footer>

</body>
</html>
