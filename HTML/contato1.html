  <section id="contato">

    <h2>Página de Contato</h2>

    <form>

      <div class="campo">
        <label for="nomeContato">Nome Completo:</label>

        <input
          type="text"
          id="nomeContato"
          name="nomeContato"
          required
          minlength="3"
          maxlength="100"
        >
      </div>

      <div class="campo">
        <label for="emailContato">Email:</label>

        <input
          type="email"
          id="emailContato"
          name="emailContato"
          required
        >
      </div>

      <div class="campo">
        <label for="mensagem">Mensagem:</label>

        <textarea
          id="mensagem"
          name="mensagem"
          required
          minlength="10"
          maxlength="300"
        ></textarea>
      </div>

      <button type="submit">Enviar</button>

    </form>

  </section>
