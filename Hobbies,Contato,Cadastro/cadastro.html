<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria, Contato e Cadastro</title>
<style>
body{
    background:black;
    color:white;
    font-size:18px;
    font-family:Arial, sans-serif;
}

h1,h2{
    font-size:28px;
}

input, textarea, button{
    font-size:18px;
}
textarea{
    width:100%;
    height:120px;
    margin-top:8px;
}
  </style>
</head>

<body>

  <header>
    <h1>Meu Site</h1>

    <nav>
    <a href="hobbies.html">Galeria</a>
    <a href="contato1.html">Contato</a>
</nav>
  </header>

<!-- CADASTRO -->

  <section id="cadastro">

    <h2>Página de Cadastro</h2>

    <form>

      <!-- Nome -->
      <div class="campo">
        <label for="nome">Nome Completo:</label>

        <input
          type="text"
          id="nome"
          name="nome"
          required
          minlength="3"
          maxlength="100"
        >
      </div>

      <!-- Email -->
      <div class="campo">
        <label for="email">Email:</label>

        <input
          type="email"
          id="email"
          name="email"
          required
        >
      </div>

      <!-- Senha -->
      <div class="campo">
        <label for="senha">Senha:</label>

        <input
          type="password"
          id="senha"
          name="senha"
          required
          minlength="6"
          maxlength="20"
        >
      </div>

      <!-- Data -->
      <div class="campo">
        <label for="dataNascimento">Data de Nascimento:</label>

        <input
          type="date"
          id="dataNascimento"
          name="dataNascimento"
          required
        >
      </div>

      <!-- Idade -->
      <div class="campo">
        <label for="idade">Idade:</label>

        <input
          type="number"
          id="idade"
          name="idade"
          required
          min="1"
          max="120"
        >
      </div>

      <!-- Telefone -->
      <div class="campo">
        <label for="telefone">Telefone:</label>

        <input
          type="tel"
          id="telefone"
          name="telefone"
          required
          pattern="[0-9]{11}"
          maxlength="11"
          placeholder="31999999999"
        >
      </div>

      <!-- Gênero -->
      <div class="campo">
        <label>Gênero:</label>

        <div class="radio-group">

          <input type="radio" id="masculino" name="genero" required>
          <label for="masculino">Masculino</label>

          <input type="radio" id="feminino" name="genero">
          <label for="feminino">Feminino</label>

          <input type="radio" id="outro" name="genero">
          <label for="outro">Outro</label>

        </div>
      </div>

      <!-- Interesses -->
      <div class="campo">
        <label>Interesses:</label>

        <div class="checkbox-group">

          <input type="checkbox" id="html" name="interesses">
          <label for="html">HTML</label>

          <input type="checkbox" id="css" name="interesses">
          <label for="css">CSS</label>

          <input type="checkbox" id="js" name="interesses">
          <label for="js">JavaScript</label>

        </div>
      </div>

      <!-- Cidade -->
      <div class="campo">
        <label for="cidade">Cidade:</label>

        <select id="cidade" name="cidade" required>

          <option value="">Selecione</option>
          <option value="coronel-fabriciano">Coronel Fabriciano</option>
          <option value="ipatinga">Ipatinga</option>
          <option value="timoteo">Timóteo</option>
          <option value="belo-horizonte">Belo Horizonte</option>

        </select>
      </div>

      <!-- Comentários -->
      <div class="campo">
        <label for="comentarios">Comentários Adicionais:</label>

        <textarea
          id="comentarios"
          name="comentarios"
          maxlength="300"
          placeholder="Digite aqui..."
        ></textarea>
      </div>

      <!-- Botões -->
      <button type="submit">Enviar Cadastro</button>

      <button type="reset">Limpar Formulário</button>

    </form>

  </section>

  <footer>
    <p>© 2026 - Site desenvolvido em HTML e CSS</p>
  </footer>

</body>
</html>
