<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria, Contato e Cadastro</title>
 <style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
}

header h1{
    margin-bottom:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:#00bfff;
}

section{
    padding:40px;
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:white;
}

form{
    max-width:700px;
    margin:auto;
    background:#111;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
}

.campo{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:white;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #555;
    background:#222;
    color:white;
    font-size:16px;
}

input::placeholder,
textarea::placeholder{
    color:#aaa;
}

textarea{
    resize:none;
    height:120px;
}


button:hover{
    background:#444;
}

footer{
    background:#111;
    text-align:center;
    padding:20px;
    margin-top:40px;
    color:white;
}
</style>
</head>

<body>

  <header>
    <h1>Meu Site</h1>

   <nav>
    <a href="file:///C:/Users/Kauan%20Machado/Desktop/LENINHO%20ATIVI%20JAVA/LENINHO%20HTML/Hobbies.html#contato">Galeria</a>
    <a href="file:///C:/Users/Kauan%20Machado/Desktop/LENINHO%20ATIVI%20JAVA/LENINHO%20HTML/contato1.html">Contato</a>
    <a href="file:///C:/Users/Kauan%20Machado/Desktop/LENINHO%20ATIVI%20JAVA/LENINHO%20HTML/cadastro.html">Cadastro</a>
</nav>
  </header>
 
  <section id="contato">

    <h2>Página de Contato</h2>

    <form>

      <div class="campo">
        <label for="nomeContato">Nome Completo:</label>

        <input
          type="text"
          id="nomeContato"
          name="nomeContato"
          required
          minlength="3"
          maxlength="100"
        >
      </div>

      <div class="campo">
        <label for="emailContato">Email:</label>

        <input
          type="email"
          id="emailContato"
          name="emailContato"
          required
        >
      </div>

      <div class="campo">
        <label for="mensagem">Mensagem:</label>

        <textarea
          id="mensagem"
          name="mensagem"
          required
          minlength="10"
          maxlength="300"
        ></textarea>
      </div>

      <button type="submit">Enviar</button>

    </form>

  </section>
